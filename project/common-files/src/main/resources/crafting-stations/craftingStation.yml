counter_sword_maker:
  option:
    # For onDone agents.
    enable-tracker: true
  display:
    title: "Sample Station"

    # GUI Layout
    layout:
      - "#########"
      - "#IIIIIII#"
      - "#IIIIIII#"
      - "#IIIIIII#"
      - "#IIIIIII#"
      - "##<###>##"
    key: 'I'
    elements:
      background:
        char: '#'
        material: GRAY_STAINED_GLASS_PANE
        name: "<dark_gray>background"
        lore: |-
          <dark_gray>Nothing to see here :)
      next_page: # next page not support char, must set a slot.
        slot: 50
        roll: true # cycle toggle page
        material: ARROW
        name: "<green>Next Page {next_page}"
        lore: |-
          toggle to page {next_page}
        agents:
          onLeft: |-
            player.sendMessage("toggled")
      previous_page: # previous page not support char, must set a slot.
        slot: 48
        roll: true # cycle toggle page
        material: ARROW
        name: "<green>Previous Page {previous_page}"
        lore: |-
          toggle to page {previous_page}
        agents:
          onLeft: |-
            player.sendMessage("toggled")
  recipes:
    test_recipe:

      displayName: "Dawn of Evenstar's card"
      plural: "Dawn of Evenstar's cards"
      displayTime: "1~10s" # Displayed time in gui. null for auto use time.
      time: "{{ random 1 to 10 }}"

      options:
        cancellable: false

      conditions:
        - name: "Player health is greater than 20"
          type: Scaled
          amount: "%player_health%"
          required: "20"
          condition: PlayerUtil.parsePlaceholders(player, "%player_health%") >= 20
          agents:
            onSuccess: |-
              player.sendMessage("Your health is < 20")
            onFail: |-
              player.sendMessage("Your health is < 20")

      messages: # If not define any message here, use default message in config.
        ConditionNotMetScaled: "Condition not met: {condition_name} - {condition_amount}/{condition_required}"

      display: # Displayed item in GUI. If leave a blank, use output list's first item.
        # Display item source. If leave a blank, use output list's first item.
        item: grass_block # or other like craftengine:default:topaz. (plugin:item)
        parameters:
          name: "Doe Card"

      inputs:
        # Support jhqwqmc's ItemBridge Item Formula Like: craftengine:default:topaz
        - item: "minecraft:paper"

          # Displayed name in gui
          displayName: "Paper"
          plural: "Papers"
      outputs:
        - item: "sertraline:doe_card"
          # parameters:
          # name: "Override name"
      agents:
        # onStart: |-
        # onCancel: |-
        # onClaim: |-
  agents:
    onStart: |-
      player.sendMessage("Starting to make" + recipe.name)
    onCancel: |-
      player.sendMessage("making" + recipe.name + "is cancelled.")
    onClaim: |-
      player.sendMessage("making" + recipe.name + "is ended!")
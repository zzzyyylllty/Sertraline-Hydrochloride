# Sertraline Configuration
# 大部分设置需要重启以应用更改
# MOST SETTINGS REQUIRED RESTART TO APPLY CHANGES
# 大部分设置需要重启以应用更改
# MOST SETTINGS REQUIRED RESTART TO APPLY CHANGES
# 大部分设置需要重启以应用更改
# MOST SETTINGS REQUIRED RESTART TO APPLY CHANGES
# 大部分设置需要重启以应用更改
# MOST SETTINGS REQUIRED RESTART TO APPLY CHANGES

# 调试模式 debug
# Debug mode
debug: false

# 语言 language
lang: en_US

# 物品更新系统
# Item Update System — automatically rebuilds items when their definition changes
# Uses sertraline_revision NBT tag to compare expected vs actual revision.
# On mismatch, the item is fully rebuilt via itemSerializer and atomically replaced.
item-update:
  enabled: true
  # 自动追踪物品文件变更（基于文件内容哈希）
  # Auto-track item file changes based on content hash
  auto-track: true
  # 自动追踪数据存储目录 (相对于插件目录)
  # Auto-track data directory (relative to plugin folder)
  auto-track-dir: "revision"
  # 触发器：何时检查并更新物品
  # Triggers: when to check and update items
  triggers:
    on-login: true       # 玩家登录时检查全部背包
    on-hold: true        # 玩家切换手持物品时检查
    on-interact: true    # 玩家交互时检查手持物品
    async-interval: 0    # 定时检查 (单位: tick, 0=禁用)
  # 更新时是否通知玩家
  notify: true

file-load:

  # If you want to use \ like \. , You must use \\. instead.
  item: "^(?![#!]).*\\.(?i)(yaml|yml|toml|tml|json|conf)$"
  lore-format: "^(?![#!]).*\\.(?i)(yaml|yml|toml|tml|json|conf)$"
  mapping: "^(?![#!]).*\\.(?i)(yaml|yml|toml|tml|json|conf)$"
  crafting-station: "^(?![#!]).*\\.(?i)(yaml|yml|toml|tml|json|conf)$"
  recipe: "^(?![#!]).*\\.(?i)(yaml|yml|toml|tml|json|conf)$"



preload:

  # 预编译脚本
  # Pre-compile scripts
  script:
    graaljs: true
    javascript: true
    jexl: true

# 模块
# Modules
modules:
  sertraline:
    feature: true
    editor: true
  xbuilder:
    feature: true
    editor: true
  minecraft:
    feature: true
    editor: false
  visual:
    feature: true
    editor: false
  mmo:
    feature: true
    editor: true
  eco:
    feature: true
    editor: true

placeholders:
  plus: "+"
  minus: "-"

rebuild:
  keep-data:
    - sertraline_data
    - sertraline_revision
  keep-component:
#    - minecraft:custom_name
    - minecraft:damage
    - minecraft:max_damage
    - minecraft:repair_cost
    - minecraft:enchantments

# 发包相关功能
# Packet related features
packet:
  # 是否注册包处理器
  # 不启用或不安装packetevents 2.10+ 所有发包功能均不会生效
  # Whether to register the packet handler
  # If not enabled or packetevents 2.10+ is not installed, all packet sending functions will not take effect
  register: true

  # 是否启用发包Lore
  # Whether to enable packet Lore
  packet-lore: true

  # 是否启用发包组件
  # Whether to enable packet component
  packet-component: true

# 标签解析
# Tag parsing
tags:
  sertraline: true
  papi: true
  val: true
  var: true
  dynamic: true
  kether: true

attribute:

  # 默认防抖时间
  # Default debounce time
  # Example: debounce-time: 250
  # updateAttribute() // Start timer
  # updateAttribute() // Reset timer
  # updateAttribute() // Reset timer from 0ms
  #
  # // after 250 ms
  # // updateAttribute execute.
  debounce-time: 1000
action:

  # 默认节流时间
  # Default throttle time
  # Example: throttle-time: 500
  # runAction() // Execute ✅
  # runAction() // Ignore ❌
  # runAction() // Ignore ❌
  #
  # // after 500 ms
  # runAction() // Execute ✅
  throttle-time: 500

  # 为每个动作设置不同的节流时间
  # 0 = 禁用节流
  # Set different throttling times for each action
  # 0 to disable
  throttle:
    onConsume: 0

database:
  enable: false  # true: MySQL; false: SQLite
  filename: data # data.db for SQLite Database File.
  host: localhost
  port: 3306
  user: x_angelkawaii_x
  password: angelkawaii2
  database: sertraline
  table: sertraline_data

# 消息设置
# Messages
messages:
  # 合成条件不满足时显示
  condition-not-met: "<red>Condition not met: {condition_name}</red>"
  # 已有合成进行中
  crafting-already-active: "<yellow>You already have an active crafting process!</yellow>"
  # 缺少材料
  missing-ingredients: "<red>Missing ingredients: {display_name}</red>"
  # 合成开始
  crafting-started: "<yellow>Crafting started... ({time} s)</yellow>"
  # 合成完成
  crafting-complete: "<green>Crafting complete!</green>"

performance:
  # 增量加载配置，只加载修改过的文件
  # Incremental loading, only load modified files
  incremental-loading:
    enable: true
    # 监控的文件类型
    # File types to monitor
    monitor:
      - item
      - mapping
      - lore-format
      - crafting-station

  adventure:
    # 使用将列表替换为带分割符号的单行文本以节省性能开销
    # 这可能带来兼容性问题，谨慎使用
    # Replace the list with a single-line text containing delimiters to reduce performance overhead
    # This may cause compatibility issues, so use it with caution
    use-split-replace-list-serialize: false

fixes:
  xbuilder:

    # XItemStack相关模块未更新 ItemModel 部分，重新添加 ItemModel
    reapply-item-model: true